*{box-sizing:border-box} html{scroll-snap-type:y mandatory;scroll-behavior:smooth} body{margin:0;background:linear-gradient(180deg,#fffaf3 0%,#f8fafc 100%);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.5;overflow-x:hidden}.slide{min-height:100dvh;width:100%;scroll-snap-align:start;scroll-snap-stop:always;padding:clamp(28px,4vh,72px) clamp(24px,5vw,96px);display:flex;align-items:center;justify-content:center;position:relative;overflow-y:auto}.slide::before{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 78% 10%,rgba(245,158,11,.14),transparent 30%),radial-gradient(circle at 8% 85%,rgba(37,99,235,.10),transparent 28%);pointer-events:none}.wrap{width:min(1180px,100%);position:relative;z-index:1}.hero h1{font-size:clamp(2.8rem,6vw,6rem);letter-spacing:-.06em;line-height:.95;margin:0 0 24px;font-weight:900}.hero .lead{font-size:clamp(1.05rem,2vw,1.45rem);max-width:920px;color:#334155}.gradient{background:linear-gradient(135deg,#ea580c,#f59e0b,#2563eb);-webkit-background-clip:text;background-clip:text;color:transparent}.eyebrow{font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.16em;color:#b45309;font-weight:800;font-size:.78rem;margin-bottom:12px}.title-row{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}.bigicon{font-size:2.4rem;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 28px rgba(15,23,42,.08);width:76px;height:76px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}.slide h2{font-size:clamp(1.8rem,3.4vw,3rem);line-height:1.08;letter-spacing:-.04em;margin:0;font-weight:900}.subtitle{font-size:clamp(.95rem,1.35vw,1.16rem);color:var(--muted);margin-top:8px;max-width:1000px}.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.chip{font-size:.78rem;font-weight:800;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:999px;padding:6px 12px}.grid{display:grid;gap:18px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 18px 38px rgba(15,23,42,.06)}.card h3{margin:0 0 10px;font-size:1rem;color:#92400e}.card p,.card li{color:#334155;font-size:.95rem}.flow{display:flex;align-items:stretch;gap:12px;flex-wrap:wrap;margin-top:28px}.step{background:#fff;border:2px solid #fde68a;border-radius:18px;padding:18px;min-width:140px;flex:1;text-align:center;font-weight:800;position:relative}.step:not(:last-child)::after{content:'→';position:absolute;right:-18px;top:50%;transform:translateY(-50%);color:#ea580c;font-size:1.35rem}.note{margin-top:22px;padding:16px 18px;background:#f8fafc;border-left:4px solid #2563eb;border-radius:12px;color:#334155}.columns{display:grid;gap:18px;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:22px}.list{margin:0;padding-left:18px}.list li{margin:7px 0}.labbox{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:start}.code{background:var(--code);color:#d1fae5;border-radius:18px;padding:18px;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:.82rem;white-space:pre-wrap}.evidence{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:18px;padding:16px}.qa{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:18px}.q{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:18px}.a{background:#eff6ff;border:1px solid #bfdbfe;border-radius:18px;padding:18px}.divider{text-align:center}.divider .section{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,16vw,12rem);font-weight:900;-webkit-text-stroke:2px rgba(245,158,11,.35);color:transparent;line-height:.8}.divider h2{font-size:clamp(2.3rem,5vw,4.4rem);}.source{position:absolute;left:32px;bottom:18px;right:140px;font-size:.72rem;color:#94a3b8;z-index:2}.source a{color:#2563eb;text-decoration:none}.progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,#ea580c,#f59e0b,#2563eb);width:0%;z-index:20}.counter{position:fixed;right:24px;bottom:16px;font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#64748b;z-index:20;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);padding:8px 12px;border-radius:999px;border:1px solid #e5e7eb}.dots{position:fixed;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:20}.dot{width:9px;height:9px;border-radius:99px;border:0;background:#cbd5e1;cursor:pointer}.dot.active{background:#ea580c;transform:scale(1.35)}.toolbar{position:fixed;left:20px;top:16px;display:flex;gap:10px;z-index:30}.toolbar button{border:1px solid #e5e7eb;background:rgba(255,255,255,.8);padding:8px 12px;border-radius:999px;font-weight:800;color:#334155;cursor:pointer}#toc{position:fixed;inset:0;background:rgba(15,23,42,.6);display:none;z-index:40;align-items:center;justify-content:center;padding:40px}.toc-panel{width:min(1000px,100%);max-height:84vh;overflow:auto;background:#fff;border-radius:28px;padding:26px}.toc-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.toc-item{padding:10px 12px;border:1px solid #e5e7eb;border-radius:12px;cursor:pointer}.toc-item:hover{background:#fff7ed}.img-icon{width:42px;height:42px;object-fit:contain}@media(max-width:900px){.grid2,.grid3,.columns,.labbox,.qa{grid-template-columns:1fr}.step:not(:last-child)::after{content:'↓';right:50%;top:auto;bottom:-22px;transform:translateX(50%)}.flow{flex-direction:column}.dots{display:none}.source{right:32px}.hero h1{font-size:2.5rem}}
</style></head><body><div class="progress" id="progress"></div><div class="toolbar"><button onclick="toggleToc()">☰ Mục lục</button><button onclick="location.hash=''">↑ Đầu</button></div><div class="dots" id="dots"></div><div class="counter" id="counter">1 / 444</div><div id="deck"></div><div id="toc"><div class="toc-panel"><div style="display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:14px"><h2 style="margin:0">Mục lục</h2><button onclick="toggleToc()" style="border:0;background:#111827;color:#fff;border-radius:12px;padding:10px 14px;font-weight:800">Đóng</button></div><div class="toc-grid" id="tocGrid"></div></div></div><script>const SLIDES=[{"title": "Foundation W1 → W6 — Learning Deck", "subtitle": "Bản học thật trong slide: mỗi course có concept, architecture, lab, lỗi hay gặp và checkpoint.", "layout": "hero", "chips": ["Không phải overview", "87 syllabus items", "Lab + Code + Q&A"]}, {"title": "Cách học deck này", "subtitle": "Một topic = 5 slide học", "layout": "content", "blocks": [["1. Concept", "Đọc định nghĩa và lý do cần học trước khi mở AWS Console."], ["2. Architecture", "Vẽ lại flow bằng tay để biết traffic, identity, data và failure domain."], ["3. Security/Cost", "Mỗi quyết định service đều phải nói được IAM, monitoring, cost."], ["4. Lab", "Chạy lệnh hoặc làm console; lưu evidence."], ["5. Checkpoint", "Tự trả lời như vấn đáp trước khi chuyển bài."]], "source": "https://aws.amazon.com/training/learn-about/architect/"}, {"title": "W1 Divider", "subtitle": "W1 — Basic Concepts", "layout": "divider", "section": "W1", "title2": "W1: Basic Concepts", "subtitle2": "Học theo trình tự syllabus, nhưng mỗi bài được mở rộng thành study slides thực hành."}, {"title": "W1 — AWS Cloud Practitioner Essentials", "subtitle": "W1 · Digital Course · 12.45h · Cloud Fundamentals / AWS Global Infrastructure", "layout": "concept", "icon": "☁️", "chips": ["Cloud Fundamentals / AWS Global Infrastructure", "Digital Course", "Duration: 12.45h"], "blocks": [["Là gì?", "Cloud computing là cách thuê năng lực tính toán, lưu trữ, mạng và dịch vụ managed theo nhu cầu thay vì mua server vật lý. AWS đóng gói hạ tầng thành services có API, quota, pricing và security boundary rõ ràng."], ["Vì sao cần học?", "Solutions Architect phải biết chọn đúng service theo yêu cầu business: tốc độ triển khai, độ sẵn sàng, độ trễ, bảo mật, chi phí và khả năng mở rộng. Không hiểu cloud fundamentals sẽ thiết kế giống on-prem và mất lợi thế managed service."], ["Nó hoạt động thế nào?", "Một workload thường đi qua Region → Availability Zone → VPC/subnet → compute → storage/database → monitoring/security/cost controls. Mỗi layer có quyết định kiến trúc riêng."]], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Architecture mental model — AWS Cloud Practitioner Essentials", "subtitle": "W1 · Digital Course · 12.45h · Cloud Fundamentals / AWS Global Infrastructure", "layout": "flow", "icon": "☁️", "steps": ["User/Client", "Edge/Region", "VPC hoặc public service endpoint", "Compute layer", "Data layer", "Observability + governance"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "AWS Cloud Practitioner Essentials", "layout": "three", "icon": "☁️", "columns": [["Security/IAM", ["Shared Responsibility: AWS bảo vệ infrastructure, khách hàng cấu hình workload đúng.", "Dùng IAM role, MFA root, least privilege ngay từ đầu.", "Bật logging/audit trước khi có incident."]], ["Cost thinking", ["Phân biệt CapEx vs OpEx, On-Demand vs commitment.", "Tag Owner/Application/Environment để trace chi phí.", "Xóa lab resources sau mỗi buổi học."]], ["Pitfalls dễ sai", ["Nhầm Region với AZ.", "Dùng root account cho việc thường ngày.", "Không tag resource nên không điều tra được cost."]]], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Lab học thật — AWS Cloud Practitioner Essentials", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Tạo account hoặc sandbox lab.", "Vào Billing preferences, bật alert/budget.", "Mở IAM, kiểm tra root MFA và tạo admin role/user lab.", "Chạy aws sts get-caller-identity để xác nhận identity hiện tại."], "code": "aws sts get-caller-identity\naws configure list\naws ec2 describe-regions --output table", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Checkpoint — AWS Cloud Practitioner Essentials", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Region khác AZ thế nào?", "Shared Responsibility Model nghĩa là gì?", "Vì sao managed service giúp giảm operational burden?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "W1 — AWS Technical Essentials", "subtitle": "W1 · Digital Course · 4h · Cloud Fundamentals / AWS Global Infrastructure", "layout": "concept", "icon": "☁️", "chips": ["Cloud Fundamentals / AWS Global Infrastructure", "Digital Course", "Duration: 4h"], "blocks": [["Là gì?", "Cloud computing là cách thuê năng lực tính toán, lưu trữ, mạng và dịch vụ managed theo nhu cầu thay vì mua server vật lý. AWS đóng gói hạ tầng thành services có API, quota, pricing và security boundary rõ ràng."], ["Vì sao cần học?", "Solutions Architect phải biết chọn đúng service theo yêu cầu business: tốc độ triển khai, độ sẵn sàng, độ trễ, bảo mật, chi phí và khả năng mở rộng. Không hiểu cloud fundamentals sẽ thiết kế giống on-prem và mất lợi thế managed service."], ["Nó hoạt động thế nào?", "Một workload thường đi qua Region → Availability Zone → VPC/subnet → compute → storage/database → monitoring/security/cost controls. Mỗi layer có quyết định kiến trúc riêng."]], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Architecture mental model — AWS Technical Essentials", "subtitle": "W1 · Digital Course · 4h · Cloud Fundamentals / AWS Global Infrastructure", "layout": "flow", "icon": "☁️", "steps": ["User/Client", "Edge/Region", "VPC hoặc public service endpoint", "Compute layer", "Data layer", "Observability + governance"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "AWS Technical Essentials", "layout": "three", "icon": "☁️", "columns": [["Security/IAM", ["Shared Responsibility: AWS bảo vệ infrastructure, khách hàng cấu hình workload đúng.", "Dùng IAM role, MFA root, least privilege ngay từ đầu.", "Bật logging/audit trước khi có incident."]], ["Cost thinking", ["Phân biệt CapEx vs OpEx, On-Demand vs commitment.", "Tag Owner/Application/Environment để trace chi phí.", "Xóa lab resources sau mỗi buổi học."]], ["Pitfalls dễ sai", ["Nhầm Region với AZ.", "Dùng root account cho việc thường ngày.", "Không tag resource nên không điều tra được cost."]]], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Lab học thật — AWS Technical Essentials", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Tạo account hoặc sandbox lab.", "Vào Billing preferences, bật alert/budget.", "Mở IAM, kiểm tra root MFA và tạo admin role/user lab.", "Chạy aws sts get-caller-identity để xác nhận identity hiện tại."], "code": "aws sts get-caller-identity\naws configure list\naws ec2 describe-regions --output table", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "Checkpoint — AWS Technical Essentials", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Region khác AZ thế nào?", "Shared Responsibility Model nghĩa là gì?", "Vì sao managed service giúp giảm operational burden?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://docs.aws.amazon.com/whitepapers/latest/aws-overview/introduction.html"}, {"title": "W2 Divider", "subtitle": "W2 — Advanced Concepts", "layout": "divider", "section": "W2", "title2": "W2: Advanced Concepts", "subtitle2": "Học theo trình tự syllabus, nhưng mỗi bài được mở rộng thành study slides thực hành."}, {"title": "W2 — AWS SimuLearn: Cloud Computing Essentials", "subtitle": "W2 · Lab · 1h · Compute: EC2 / Auto Scaling / Containers", "layout": "concept", "icon": "🖥️", "chips": ["Compute: EC2 / Auto Scaling / Containers", "Lab", "Duration: 1h"], "blocks": [["Là gì?", "Compute là nơi chạy workload: EC2 cho VM kiểm soát cao, Auto Scaling Group cho fleet, ECS/EKS cho container, Fargate cho serverless container, Lambda cho function/event-driven."], ["Vì sao cần học?", "Chọn sai compute dẫn tới cost cao hoặc vận hành nặng. Solutions Architect phải chọn compute theo runtime, startup time, state, scaling pattern, networking và compliance."], ["Nó hoạt động thế nào?", "Traffic đi qua ALB/NLB tới target group. EC2/containers chạy trong subnet, dùng security group, IAM role, CloudWatch metrics/logs và Auto Scaling policy dựa trên CPU/request/custom metric."]], "source": "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/concepts.html"}, {"title": "Architecture mental model — AWS SimuLearn: Cloud Computing Essentials", "subtitle": "W2 · Lab · 1h · Compute: EC2 / Auto Scaling / Containers", "layout": "flow", "icon": "🖥️", "steps": ["Route 53/CloudFront", "ALB/NLB", "Target group", "EC2/ECS/EKS/Fargate", "EBS/EFS/S3/Data stores", "CloudWatch + Auto Scaling"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/concepts.html"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "AWS SimuLearn: Cloud Computing Essentials", "layout": "three", "icon": "🖥️", "columns": [["Security/IAM", ["Không SSH public nếu có thể dùng SSM Session Manager.", "Security group chỉ mở port cần thiết từ nguồn cần thiết.", "Dùng instance profile thay access key."]], ["Cost thinking", ["Right-size instance.", "Dùng Savings Plans/Reserved cho baseline, Spot cho fault-tolerant batch.", "Tắt dev resources ngoài giờ."]], ["Pitfalls dễ sai", ["Mở 0.0.0.0/0 cho SSH/RDP.", "Không cấu hình health check nên ALB route tới instance lỗi.", "Stateful app chạy trên instance local disk không backup."]]], "source": "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/concepts.html"}, {"title": "Lab học thật — AWS SimuLearn: Cloud Computing Essentials", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Launch EC2 trong public subnet với SG chỉ mở HTTP.", "Cài web server bằng user data.", "Gắn IAM role đọc S3.", "Tạo AMI hoặc Launch Template.", "Thêm ASG + ALB health check."], "code": "aws ec2 describe-instances --query \"Reservations[].Instances[].{Id:InstanceId,State:State.Name,Type:InstanceType}\" --output table", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/concepts.html"}, {"title": "Checkpoint — AWS SimuLearn: Cloud Computing Essentials", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["EC2 khác Lambda/Fargate thế nào?", "ALB health check fail thì điều tra gì?", "Spot instance dùng cho workload nào?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/concepts.html"}, {"title": "W2 — Getting Started with AWS Storage", "subtitle": "W2 · Digital Course · 3.15h · Amazon S3 / Object Storage", "layout": "concept", "icon": "🪣", "chips": ["Amazon S3 / Object Storage", "Digital Course", "Duration: 3.15h"], "blocks": [["Là gì?", "S3 là object storage: dữ liệu nằm trong bucket, mỗi object có key, metadata, version ID nếu bật versioning. S3 phù hợp file, backup, data lake, static website, log archive, ML dataset."], ["Vì sao cần học?", "S3 là data backbone của AWS. Hầu hết architecture đều dùng S3 để lưu artifact, log, backup, data lake hoặc website assets. Hiểu bucket policy, lifecycle, storage class là bắt buộc."], ["Nó hoạt động thế nào?", "Client gọi S3 API qua endpo ], "source": "https://docs.aws.amazon.com/wellarchitected/latest/framework/welcome.html"}, {"title": "W2 — AWS Security Fundamentals Second Edition", "subtitle": "W2 · Digital Course · 2h · Security, Governance & Compliance", "layout": "concept", "icon": "🛡️", "chips": ["Security, Governance & Compliance", "Digital Course", "Duration: 2h"], "blocks": [["Là gì?", "Security trên AWS gồm identity, network controls, encryption, detection, audit, governance và incident response. Dịch vụ thường gặp: IAM, KMS, CloudTrail, Config, GuardDuty, Security Hub, Macie, Trusted Advisor."], ["Vì sao cần học?", "Kiến trúc tốt phải secure-by-default. Nếu security thêm sau cùng, bạn dễ có public DB/S3, leaked key, lateral movement, không có audit trail và vi phạm compliance."], ["Nó hoạt động thế nào?", "Preventive controls chặn sai từ đầu; detective controls phát hiện; responsive controls tự động hoặc runbook xử lý. Governance nhiều account dùng Organizations/SCP/Config/Control Tower."]], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Architecture mental model — AWS Security Fundamentals Second Edition", "subtitle": "W2 · Digital Course · 2h · Security, Governance & Compliance", "layout": "flow", "icon": "🛡️", "steps": ["IAM/SCP", "Network SG/NACL/WAF", "Encryption KMS/TLS", "Detect CloudTrail/GuardDuty/Macie", "Govern Config/SecurityHub", "Respond EventBridge/Lambda/SSM"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "AWS Security Fundamentals Second Edition", "layout": "three", "icon": "🛡️", "columns": [["Security/IAM", ["Least privilege, MFA, no long-lived keys nếu tránh được.", "Bật CloudTrail organization trail.", "Dùng KMS CMK khi cần control key policy/rotation."]], ["Cost thinking", ["GuardDuty/Security Hub/Macie có cost theo volume/scope.", "Bật đúng scope và monitor usage.", "Security incident cost thường lớn hơn phí tool."]], ["Pitfalls dễ sai", ["Chỉ bảo vệ network nhưng bỏ IAM.", "Không bật CloudTrail trước incident.", "Key policy KMS khóa cả admin."]]], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Lab học thật — AWS Security Fundamentals Second Edition", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Bật CloudTrail trail ghi S3.", "Tạo AWS Config rule kiểm tra S3 public.", "Dùng Trusted Advisor/Security Hub review finding.", "Tạo KMS key và encrypt S3 object."], "code": "aws cloudtrail describe-trails\naws configservice describe-compliance-by-config-rule\naws kms list-keys", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Checkpoint — AWS Security Fundamentals Second Edition", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Preventive vs detective controls?", "KMS key policy khác IAM policy thế nào?", "Config khác CloudTrail?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "W3 Divider", "subtitle": "W3 — Advanced Concepts", "layout": "divider", "section": "W3", "title2": "W3: Advanced Concepts", "subtitle2": "Học theo trình tự syllabus, nhưng mỗi bài được mở rộng thành study slides thực hành."}, {"title": "W3 — Multi-Agent Collaboration with Amazon Bedrock Agents", "subtitle": "W3 · Digital Course · 1h · Amazon Bedrock / GenAI", "layout": "concept", "icon": "🤖", "chips": ["Amazon Bedrock / GenAI", "Digital Course", "Duration: 1h"], "blocks": [["Là gì?", "Bedrock là managed service để dùng foundation models qua API, xây dựng GenAI app với model access, inference, Knowledge Bases, Agents, Guardrails, evaluation và tooling liên quan."], ["Vì sao cần học?", "Bedrock giúp build AI app mà không tự host model. Architect cần hiểu model choice, token/cost, RAG, security, data privacy, guardrails và integration với app backend."], ["Nó hoạt động thế nào?", "App gọi Bedrock Runtime/Agent/KB API. Prompt + context + tool calls đi vào model. Output được kiểm soát bằng guardrails, logging và application-level validation."]], "source": "https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html"}, {"title": "Architecture mental model — Multi-Agent Collaboration with Amazon Bedrock Agents", "subtitle": "W3 · Digital Course · 1h · Amazon Bedrock / GenAI", "layout": "flow", "icon": "🤖", "steps": ["Application/API", "Prompt + user input", "Knowledge Base / tools / agents", "Foundation model", "Guardrails", "Response + monitoring"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "Multi-Agent Collaboration with Amazon Bedrock Agents", "layout": "three", "icon": "🤖", "columns": [["Security/IAM", ["Không đưa secret/PII không cần thiết vào prompt.", "Dùng IAM permission cụ thể theo model/action.", "Guardrails giúp lọc nội dung nhưng không thay thế validation nghiệp vụ."]], ["Cost thinking", ["Tính theo token/input-output hoặc đơn vị service.", "RAG giảm hallucination nhưng thêm cost embedding/vector store/retrieval.", "Cache/context compression giúp giảm token."]], ["Pitfalls dễ sai", ["Nhầm chatbot bình thường với RAG có source.", "Không log prompt/response metadata nên khó debug.", "Chọn model đắt cho tác vụ đơn giản."]]], "source": "https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html"}, {"title": "Lab học thật — Multi-Agent Collaboration with Amazon Bedrock Agents", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Enable model access trong Bedrock.", "Gọi InvokeModel với prompt ngắn.", "Tạo KB từ S3 docs nếu có sandbox.", "Test câu hỏi có/không có KB.", "Thêm guardrail policy cơ bản."], "code": "aws bedrock list-foundation-models --region us-west-2\n# invoke model cần payload theo từng provider/model", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html"}, {"title": "Checkpoint — Multi-Agent Collaboration with Amazon Bedrock Agents", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Retrieve khác RetrieveAndGenerate?", "KB/RAG giải quyết hallucination thế nào?", "Agent khác workflow code thường?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://docs.aws.amazon.com/bedrock/latest/userguide/what-is-bedrock.html"}, {"title": "W3 — Build with Amazon S3 Vectors and Amazon Bedrock Knowledge Bases", "subtitle": "W3 · Digital Course · 1h · Amazon S3 / Object Storage", "layout": "concept", "icon": "🪣", "chips": ["Amazon S3 / Object Storage", "Digital Course", "Duration: 1h"], "blocks": [["Là gì?", "S3 là object storage: dữ liệu nằm trong bucket, mỗi object có key, metadata, version ID nếu bật versioning. S3 phù hợp file, backup, data lake, static website, log archive, ML dataset."], ["Vì sao cần học?", "S3 là data backbone của AWS. Hầu hết architecture đều dùng S3 để lưu artifact, log, backup, data lake hoặc website assets. Hiểu bucket policy, lifecycle, storage class là bắt buộc."], ["Nó hoạt động thế nào?", "Client gọi S3 API qua endpoint. IAM/bucket policy quyết định quyền. Object được lưu phân tán, có storage class, encryption, versioning, lifecycle, event notification và replication."]], "source": "https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html"}, {"title": "Architecture mental model — Build with Amazon S3 Vectors and Amazon Bedrock Knowledge Bases", "subtitle": "W3 · Digital Course · 1h · Amazon S3 / Object Storage", "layout": "flow", "icon": "🪣", "steps": ["Client/App", "IAM auth", "S3 bucket", "Object key + metadata", "Lifecycle/replication/event", "CloudTrail/CloudWatch/S3 Storage Lens"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "Build with Amazon S3 Vectors and Amazon Bedrock Knowledge Bases", "layout": "three", "icon": "🪣", "columns": [["Security/IAM", ["Bucket private by default; giữ Block Public Access trừ khi có lý do rõ.", "Dùng bucket policy với condition như aws:SecureTransport.", "Bật SSE-S3 hoặc SSE-KMS tùy compliance."]], ["Cost thinking", ["Storage class đúng access pattern: Standard, IA, Glacier, Intelligent-Tiering.", "Lifecycle xóa/transition object cũ.", "Request, retrieval, data transfer cũng tính tiền, không chỉ GB storage."]], ["Pitfalls dễ sai", ["Public bucket do tắt Block Public Access.", "Dùng ACL thay vì policy mới.", "Không để ý phí request/retrieval của Glacier/IA."]]], "source": "https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html"}, {"title": "Lab học thật — Build with Amazon S3 Vectors and Amazon Bedrock Knowledge Bases", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Tạo bucket private.", "Upload object.", "Bật versioning rồi overwrite file.", "Thêm lifecycle rule transition sang IA/Glacier.", "Viết bucket policy bắt buộc HTTPS."], "code": "aws s3 mb s3://my-study-bucket-123\naws s3 cp notes.txt s3://my-study-bucket-123/notes.txt\naws s3api put-bucket-versioning --bucket my-study-bucket-123 --versioning-configuration Status=Enabled", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html"}, {"title": "Checkpoint — Build with Amazon S3 Vectors and Amazon Bedrock Knowledge Bases", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["S3 object khác file system file thế nào?", "Bucket policy khác IAM policy?", "Khi nào dùng S3 Intelligent-Tiering?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html"}, {"title": "W3 — AWS SimuLearn: Explore the Amazon Bedrock Playgrounds", "subtitle": "W3 · Lab · 1h · Amazon Bedrock / GenAI", "layout": "concept", "icon": "🤖", "chips": ["Amazon Bedrock / GenAI", "Lab", "Duration: 1h"], "blocks": [["Là gì?", "Bedrock là managed service để dùng foundation models qua API, xây dựng GenAI app với model access, i oudTrail organization trail.", "Dùng KMS CMK khi cần control key policy/rotation."]], ["Cost thinking", ["GuardDuty/Security Hub/Macie có cost theo volume/scope.", "Bật đúng scope và monitor usage.", "Security incident cost thường lớn hơn phí tool."]], ["Pitfalls dễ sai", ["Chỉ bảo vệ network nhưng bỏ IAM.", "Không bật CloudTrail trước incident.", "Key policy KMS khóa cả admin."]]], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Lab học thật — Auditing Your Security with AWS Trusted Advisor", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Bật CloudTrail trail ghi S3.", "Tạo AWS Config rule kiểm tra S3 public.", "Dùng Trusted Advisor/Security Hub review finding.", "Tạo KMS key và encrypt S3 object."], "code": "aws cloudtrail describe-trails\naws configservice describe-compliance-by-config-rule\naws kms list-keys", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Checkpoint — Auditing Your Security with AWS Trusted Advisor", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Preventive vs detective controls?", "KMS key policy khác IAM policy thế nào?", "Config khác CloudTrail?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "W6 — Getting Started with AWS Systems Manager", "subtitle": "W6 · Lab · 1h · Observability / CloudWatch / X-Ray", "layout": "concept", "icon": "📈", "chips": ["Observability / Clou ions/SCP/Config/Control Tower."]], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Architecture mental model — Optimize Your Cloud Governance: Balance Security and Cost", "subtitle": "W6 · Digital Course · 3h · Security, Governance & Compliance", "layout": "flow", "icon": "🛡️", "steps": ["IAM/SCP", "Network SG/NACL/WAF", "Encryption KMS/TLS", "Detect CloudTrail/GuardDuty/Macie", "Govern Config/SecurityHub", "Respond EventBridge/Lambda/SSM"], "notes": ["Đọc diagram từ trái sang phải: ai gọi ai, traffic đi qua layer nào, state nằm ở đâu, failure domain ở đâu.", "Khi đi thi/vấn đáp, luôn nói theo 4 góc: security, reliability, performance, cost."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Deep dive — Security / Cost / Monitoring", "subtitle": "Optimize Your Cloud Governance: Balance Security and Cost", "layout": "three", "icon": "🛡️", "columns": [["Security/IAM", ["Least privilege, MFA, no long-lived keys nếu tránh được.", "Bật CloudTrail organization trail.", "Dùng KMS CMK khi cần control key policy/rotation."]], ["Cost thinking", ["GuardDuty/Security Hub/Macie có cost theo volume/scope.", "Bật đúng scope và monitor usage.", "Security incident cost thường lớn hơn phí tool."]], ["Pitfalls dễ sai", ["Chỉ bảo vệ network nhưng bỏ IAM.", "Không bật CloudTrail trước incident.", "Key policy KMS khóa cả admin."]]], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Lab học thật — Optimize Your Cloud Governance: Balance Security and Cost", "subtitle": "Làm được mới tính là hiểu", "layout": "lab", "icon": "🧪", "steps": ["Bật CloudTrail trail ghi S3.", "Tạo AWS Config rule kiểm tra S3 public.", "Dùng Trusted Advisor/Security Hub review finding.", "Tạo KMS key và encrypt S3 object."], "code": "aws cloudtrail describe-trails\naws configservice describe-compliance-by-config-rule\naws kms list-keys", "evidence": ["Screenshot console hoặc output CLI.", "Giải thích được resource nào public/private.", "Nêu được quyền IAM tối thiểu cần có.", "Dọn resource sau lab để tránh cost."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "Checkpoint — Optimize Your Cloud Governance: Balance Security and Cost", "subtitle": "Tự kiểm tra trước khi qua topic tiếp theo", "layout": "qa", "icon": "❓", "questions": ["Preventive vs detective controls?", "KMS key policy khác IAM policy thế nào?", "Config khác CloudTrail?"], "answers": ["Trả lời theo cấu trúc: definition → why → architecture → security/cost trade-off.", "Nếu hỏi tình huống, bắt đầu từ symptoms → telemetry → hypothesis → fix → prevention.", "Nếu có lựa chọn service, so sánh bằng access pattern, scaling, data model, cost và ops burden."], "source": "https://aws.amazon.com/architecture/security-identity-compliance/"}, {"title": "W6 — AWS Cloud Financial Management for Builders", "subtitle": "W6 · Digital Course · 1.5h · Cost Optimization / Cloud Financial Management", "layout": "concept", "icon": "💸", "chips": ["Cost Optimization / Cloud Financial Management", "Digital Course", "Duration: 1.5h"], "blocks": [["Là gì?", "Cost management gồm visibility, allocation, budgeting, forecasting, anomaly detection, rightsizing và commitment. Dịch vụ: Cost Explorer, Budgets, CUR, Cost Anomaly Detection, Compute Optimizer."], ["Vì sao cần học?", "AWS scale nhanh nên chi phí cũng scale nhanh. Architect phải thiết kế cost-aware: đúng service, đúng size, đúng storage class, đúng purchase model và đo cost theo team/app."], ["Nó hoạt động thế nào?", "Tag resource → collect cost data → allocate theo dimensions → detect anomaly/budget breach → optimize rightsizing/storage/network/commitments → governance policy."]], "source": "https://docs.aws.amazon.com/cost-management/latest/userguide/what-is-costmanagement.html"}, {"title": "Architecture mental model — AWS Cloud Financial Management for Builders", "subtitle": "W6 · Digital Course · 1.5h · Cost Optimi function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function source(s){return s?`<div class="source">Nguồn học: <a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a></div>`:''}
function chips(arr){return arr&&arr.length?`<div class="chips">${arr.filter(Boolean).map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div>`:''}
function list(items){return `<ul class="list">${(items||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}
function render(s,i){let body='';let icon=s.icon||'📘';if(s.layout==='hero'){body=`<section class="slide hero" id="slide-${i}"><div class="wrap"><div class="eyebrow">Learning Slide Deck</div><h1>${esc(s.title).replace('—','<br><span class="gradient">—</span>')}</h1><p class="lead">${esc(s.subtitle)}</p>${chips(s.chips)}</div>${source(s.source)}</section>`}
else if(s.layout==='divider'){body=`<section class="slide divider" id="slide-${i}"><div class="wrap"><div class="section">${esc(s.section||'')}</div><div class="eyebrow">Section</div><h2>${esc(s.title2||s.title)}</h2><p class="subtitle" style="margin-left:auto;margin-right:auto">${esc(s.subtitle2||s.subtitle)}</p></div>${source(s.source)}</section>`}
else if(s.layout==='concept'||s.layout==='content'){body=`<section class="slide" id="slide-${i}"><div class="wrap"><div class="title-row"><div class="bigicon">${esc(icon)}</div><div><div class="eyebrow">Study Unit</div><h2>${esc(s.title)}</h2><p class="subtitle">${esc(s.subtitle)}</p>${chips(s.chips)}</div></div><div class="grid grid3">${(s.blocks||[]).map(b=>`<div class="card"><h3>${esc(b[0])}</h3><p>${esc(b[1])}</p></div>`).join('')}</div></div>${source(s.source)}</section>`}
else if(s.layout==='flow'){body=`<section class="slide" id="slide-${i}"><div class="wrap"><div class="title-row"><div class="bigicon">${esc(icon)}</div><div><div class="eyebrow">Architecture Model</div><h2>${esc(s.title)}</h2><p class="subtitle">${esc(s.subtitle)}</p></div></div><div class="flow">${(s.steps||[]).map(x=>`<div class="step">${esc(x)}</div>`).join('')}</div>${(s.notes||[]).map(n=>`<div class="note">${esc(n)}</div>`).join('')}</div>${source(s.source)}</section>`}
else if(s.layout==='three'){body=`<section class="slide" id="slide-${i}"><div class="wrap"><div class="title-row"><div class="bigicon">${esc(icon)}</div><div><div class="eyebrow">Deep Dive</div><h2>${esc(s.title)}</h2><p class="subtitle">${esc(s.subtitle)}</p></div></div><div class="columns">${(s.columns||[]).map(c=>`<div class="card"><h3>${esc(c[0])}</h3>${list(c[1])}</div>`).join('')}</div></div>${source(s.source)}</section>`}
else if(s.layout==='lab'){body=`<section class="slide" id="slide-${i}"><div class="wrap"><div class="title-row"><div class="bigicon">${esc(icon)}</div><div><div class="eyebrow">Hands-on Lab</div><h2>${esc(s.title)}</h2><p class="subtitle">${esc(s.subtitle)}</p></div></div><div class="labbox"><div class="card"><h3>Step-by-step</h3>${list(s.steps)}</div><div><div class="code">${esc(s.code||'')}</div><div class="evidence" style="margin-top:14px"><h3>Evidence cần nộp</h3>${list(s.evidence)}</div></div></div></div>${source(s.source)}</section>`}
else if(s.layout==='qa'){body=`<section class="slide" id="slide-${i}"><div class="wrap"><div class="title-row"><div class="bigicon">${esc(icon)}</div><div><div class="eyebrow">Checkpoint</div><h2>${esc(s.title)}</h2><p class="subtitle">${esc(s.subtitle)}</p></div></div><div class="qa"><div class="q"><h3>Câu hỏi</h3>${list(s.questions)}</div><div class="a"><h3>Cách trả lời / đáp án</h3>${list(s.answers)}</div></div></div>${source(s.source)}</section>`}
return body;}
const deck=document.getElementById('deck');deck.innerHTML=SLIDES.map(render).join('');const dots=document.getElementById('dots');dots.innerHTML=SLIDES.map((_,i)=>`<button class="dot" onclick="go(${i})"></button>`).join('');const tocGrid=document.getElementById('tocGrid');tocGrid.innerHTML=SLIDES.map((s,i)=>`<div class="toc-item" onclick="go(${i});toggleToc(false)"><b>${String(i+1).padStart(3,'0')}</b> — ${esc(s.title)}</div>`).join('');function go(i){document.getElementById('slide-'+i).scrollIntoView({behavior:'smooth'})}function toggleToc(force){const t=document.getElementById('toc');t.style.display=(force===false||t.style.display==='flex')?'none':'flex'}function update(){const els=[...document.querySelectorAll('.slide')];let idx=0;let best=1e9;els.forEach((el,i)=>{const d=Math.abs(el.getBoundingClientRect().top);if(d<best){best=d;idx=i}});document.getElementById('counter').innerHTML=`<strong>${String(idx+1).padStart(2,'0')}</strong> / ${els.length}`;document.getElementById('progress').style.width=((idx+1)/els.length*100)+'%';document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));}document.addEventListener('scroll',update,{passive:true});window.addEventListener('load',update);document.addEventListener('keydown',e=>{const els=[...document.querySelectorAll('.slide')];let idx=els.findIndex(el=>Math.abs(el.getBoundingClientRect().top)<innerHeight/2);if(['ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();go(Math.min(els.length-1,idx+1));}if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();go(Math.max(0,idx-1));}if(e.key==='Home')go(0);if(e.key==='End')go(els.length-1);if(e.key.toLowerCase()==='m')toggleToc();});</script></body></html>
